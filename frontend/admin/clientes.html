<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Clientes · Diernus Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%232C49C7'/%3E%3Ctext x='32' y='45' font-family='monospace' font-weight='bold' font-size='38' fill='%23EDEAE3' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="app"></main>
  <div class="modal-back" id="modalBack">
    <div class="modal">
      <h2 id="modalTitle">+ Cliente</h2>
      <div class="error" id="err" style="display:none"></div>
      <form id="form">
        <label class="field"><label>Nome</label><input type="text" name="name" required></label>
        <label class="field"><label>Email</label><input type="email" name="email" required></label>
        <div class="row" style="display:flex;gap:.55rem">
          <button type="button" class="btn ghost" id="cancel" style="flex:1;justify-content:center;padding:.55rem">Cancelar</button>
          <button type="submit" class="btn primary" id="submit" style="flex:1;justify-content:center;padding:.55rem">Criar cliente</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module">
    import { renderLayout, fmtDate, timeAgo, pageLoading, safeRender } from '/shared/layout.js';
    import { api } from '/shared/api.js';
    const { content } = await renderLayout({ active: 'clients', crumbs: ['Clientes'] });
    const loading = pageLoading(content, 'A carregar clientes…');

    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    async function render() {
      const { clients } = await api.clients();
      const active   = clients.filter(c => c.status === 'active');
      const pending  = clients.filter(c => c.status === 'pending');

      content.innerHTML = `
        <div class="page-head">
          <div>
            <span class="eyebrow">Clientes</span>
            <h1>${clients.length} ${clients.length === 1 ? 'cliente' : 'clientes'}</h1>
            <p class="lede">Crie um cliente (não envia email) e envie o convite quando estiver pronto. Os clientes ativos têm acesso ao portal para acompanhar o projeto.</p>
          </div>
          <div class="actions">
            <button class="btn primary" id="newClient">+ Novo cliente</button>
          </div>
        </div>

        ${clients.length === 0
          ? '<div class="empty"><div class="empty-title">Sem clientes ainda</div><div class="empty-sub">Crie o primeiro cliente para começar. Não enviamos email — só quando enviar o convite.</div><div class="empty-cta"><button class="btn primary" onclick="document.getElementById(\'newClient\').click()">+ Novo cliente</button></div></div>'
          : `<table class="table">
              <thead>
                <tr><th>Nome</th><th>Email</th><th>Estado</th><th>Convite</th><th>Criado</th><th></th></tr>
              </thead>
              <tbody>
                ${clients.map(c => {
                  const inv = c.invite;
                  const invStatus = !inv ? '—' :
                    inv.accepted_at ? 'aceite' :
                    new Date(inv.expires_at) < new Date() ? 'expirado' : 'pendente';
                  return `
                    <tr data-id="${c.id}">
                      <td class="name"><a href="/admin/cliente.html?id=${c.id}">${escapeHtml(c.name)}</a></td>
                      <td><span class="mono" style="font-size:.8rem">${escapeHtml(c.email)}</span></td>
                      <td><span class="status-pill ${c.status}">${c.status === 'active' ? 'ativo' : c.status === 'pending' ? 'pendente' : c.status}</span></td>
                      <td><span class="status-pill ${invStatus === 'aceite' ? 'active' : invStatus === 'pendente' ? 'pending' : 'suspended'}">${invStatus}</span></td>
                      <td><span class="mono" style="color:var(--graphite-60);font-size:.8rem">${timeAgo(c.created_at)}</span></td>
                      <td class="actions">
                        <div class="row-actions">
                          <a class="btn sm ghost" href="/admin/cliente.html?id=${c.id}">Ver</a>
                          ${c.status !== 'active' ? `<button class="btn sm ghost" data-action="invite" data-id="${c.id}">Reenviar convite</button>` : ''}
                        </div>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>`}
      `;

      // wire new
      content.querySelector('#newClient').addEventListener('click', () => openModal());
      // wire row actions
      content.querySelectorAll('[data-action="invite"]').forEach(b => {
        b.addEventListener('click', () => inviteOne(b.dataset.id, b));
      });
    }

    function openModal() {
      document.getElementById('form').reset();
      document.getElementById('err').style.display = 'none';
      document.getElementById('modalBack').classList.add('on');
      document.getElementById('modalTitle').textContent = '+ Cliente';
      setTimeout(() => document.querySelector('input[name="name"]').focus(), 50);
    }
    function closeModal() { document.getElementById('modalBack').classList.remove('on'); }
    document.getElementById('cancel').addEventListener('click', closeModal);
    document.getElementById('modalBack').addEventListener('click', e => { if (e.target.id === 'modalBack') closeModal(); });

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const data = new FormData(e.target);
      const submit = document.getElementById('submit');
      submit.disabled = true; submit.textContent = 'A criar…';
      try {
        await api.createClient(data.get('email'), data.get('name'));
        closeModal();
        await render();
      } catch (err) {
        const el = document.getElementById('err');
        el.textContent = err.message;
        el.style.display = '';
      } finally {
        submit.disabled = false; submit.textContent = 'Criar cliente';
      }
    });

    async function inviteOne(id, btn) {
      const original = btn.textContent;
      btn.disabled = true; btn.textContent = 'A enviar…';
      try {
        const res = await api.inviteClient(id);
        if (res.warning) {
          const url = res.invitation && res.invitation.accept_url;
          prompt('Email não enviado — copie este link para enviar manualmente:', url);
        } else {
          btn.textContent = '✓ Enviado';
          setTimeout(() => { btn.textContent = original; btn.disabled = false; render(); }, 1500);
          return;
        }
      } catch (e) {
        alert('Erro: ' + e.message);
      }
      btn.disabled = false; btn.textContent = original;
    }

    safeRender(loading, render);
  </script>
</body>
</html>
