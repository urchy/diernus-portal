<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Administração · Diernus Portal</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%232C49C7'/%3E%3Ctext x='32' y='45' font-family='monospace' font-weight='bold' font-size='38' fill='%23EDEAE3' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
  <nav class="bar">
    <a class="wordmark" href="/admin/"><b>D</b> DIERNUS · ADMIN</a>
    <span class="who" id="who"></span>
    <button class="logout" id="logout">Sair</button>
  </nav>

  <main class="page">
    <p class="eyebrow">Administração</p>
    <h1>Projetos e clientes</h1>
    <p class="lede">Crie projetos para os seus clientes, convide novos clientes ou membros da equipa, e gira tudo num só lugar.</p>

    <div class="row" style="margin-bottom:1.5rem">
      <button class="btn primary" id="newProject">+ Novo projeto</button>
      <button class="btn ghost"   id="newClient">+ Convidar cliente</button>
      <button class="btn ghost"   id="newTeam">+ Convidar equipa</button>
      <span class="spacer"></span>
      <button class="btn ghost" id="refresh">Atualizar</button>
    </div>

    <div id="content" class="grid"></div>
  </main>

  <!-- Modal: New project -->
  <div class="modal-back" id="modalProject">
    <div class="modal">
      <h2 style="font-family:var(--display);text-transform:uppercase;font-size:1.4rem;margin-bottom:1rem">Novo projeto</h2>
      <div class="error" id="projErr" style="display:none"></div>
      <form id="projForm">
        <label class="field"><label>Cliente</label><select name="client_id" id="projClient" required></select></label>
        <label class="field"><label>Nome do projeto</label><input type="text" name="name" required></label>
        <label class="field"><label>Descrição (opcional)</label><textarea name="description" rows="3"></textarea></label>
        <div class="row">
          <button type="button" class="btn ghost"   id="projCancel">Cancelar</button>
          <span class="spacer"></span>
          <button type="submit" class="btn primary" id="projSubmit">Criar projeto</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Invite -->
  <div class="modal-back" id="modalInvite">
    <div class="modal">
      <h2 style="font-family:var(--display);text-transform:uppercase;font-size:1.4rem;margin-bottom:1rem" id="inviteTitle">Convidar</h2>
      <div class="error"   id="invErr"  style="display:none"></div>
      <div class="success" id="invOk"   style="display:none"></div>
      <form id="invForm">
        <label class="field"><label>Nome</label><input type="text" name="name" required></label>
        <label class="field"><label>Email</label><input type="email" name="email" required></label>
        <input type="hidden" name="role" id="inviteRole" value="client">
        <div class="row">
          <button type="button" class="btn ghost"   id="invCancel">Cancelar</button>
          <span class="spacer"></span>
          <button type="submit" class="btn primary" id="invSubmit">Enviar convite</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { api, $, el, fmtDate } from '/shared/api.js';
    let me;
    try { me = (await api.me()).user; }
    catch { location.replace('/login.html'); throw new Error('not logged in'); }
    if (me.role !== 'studio') { location.replace('/portal/'); throw new Error('not a studio user'); }

    $('#name') && ($('#name').textContent = me.name.split(' ')[0]);
    $('#who').innerHTML = `<span class="role">estúdio</span> ${me.name}`;

    $('#logout').addEventListener('click', async () => { await api.logout(); location.replace('/login.html'); });

    // --- modals ---
    function openModal(id) { $('#' + id).classList.add('on'); }
    function closeModal(id) { $('#' + id).classList.remove('on'); }

    $('#newProject').addEventListener('click', async () => {
      // load clients into the select
      try {
        const { clients } = await api.clients();
        const sel = $('#projClient');
        sel.innerHTML = '';
        if (!clients.length) {
          sel.innerHTML = '<option value="">— sem clientes —</option>';
          $('#projSubmit').disabled = true;
        } else {
          sel.innerHTML = '<option value="">— escolha um cliente —</option>' +
            clients.map(c => `<option value="${c.id}">${c.name} (${c.email})</option>`).join('');
          $('#projSubmit').disabled = false;
        }
      } catch (e) { $('#projErr').textContent = e.message; $('#projErr').style.display = ''; }
      openModal('modalProject');
    });
    $('#projCancel').addEventListener('click', () => closeModal('modalProject'));
    $('#projForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(e.target);
      $('#projErr').style.display = 'none';
      $('#projSubmit').disabled = true; $('#projSubmit').textContent = 'A criar…';
      try {
        await api.createProject(data.get('client_id'), data.get('name'), data.get('description'));
        closeModal('modalProject');
        await loadProjects();
      } catch (e) {
        $('#projErr').textContent = e.message; $('#projErr').style.display = '';
      } finally {
        $('#projSubmit').disabled = false; $('#projSubmit').textContent = 'Criar projeto';
      }
    });

    function openInvite(role) {
      $('#inviteRole').value = role;
      $('#inviteTitle').textContent = role === 'client' ? 'Convidar cliente' : 'Convidar membro da equipa';
      $('#invErr').style.display = 'none'; $('#invOk').style.display = 'none';
      $('#invForm').reset();
      $('#inviteRole').value = role;
      openModal('modalInvite');
    }
    $('#newClient').addEventListener('click', () => openInvite('client'));
    $('#newTeam').addEventListener('click',   () => openInvite('studio'));
    $('#invCancel').addEventListener('click', () => closeModal('modalInvite'));
    $('#invForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(e.target);
      $('#invErr').style.display = 'none'; $('#invOk').style.display = 'none';
      $('#invSubmit').disabled = true; $('#invSubmit').textContent = 'A enviar…';
      try {
        const res = await api.invite(data.get('email'), data.get('name'), data.get('role'));
        const url = res.invitation && res.invitation.accept_url;
        const warn = res.warning ? ` — ${res.warning}` : '';
        if (url) {
          $('#invOk').innerHTML = `Convite criado (email não enviado${warn}). Copie o link:<br><a href="${url}">${url}</a>`;
        } else {
          $('#invOk').textContent = 'Convite enviado por email.';
        }
        $('#invOk').style.display = '';
      } catch (e) {
        $('#invErr').textContent = e.message; $('#invErr').style.display = '';
      } finally {
        $('#invSubmit').disabled = false; $('#invSubmit').textContent = 'Enviar convite';
      }
    });

    $('#refresh').addEventListener('click', loadProjects);

    async function loadProjects() {
      const content = $('#content');
      try {
        const { projects } = await api.projects();
        if (!projects.length) {
          content.outerHTML = '<div class="empty">Sem projetos ainda. Crie o primeiro com o botão acima.</div>';
          return;
        }
        content.innerHTML = '';
        for (const p of projects) {
          const card = el('a', { class: 'card', href: '#' + p.id, style: 'text-decoration:none;color:inherit' },
            el('span', { class: 'eyebrow' }, p.status === 'active' ? 'EM CURSO' : p.status === 'completed' ? 'CONCLUÍDO' : 'ARQUIVADO'),
            el('h3', {}, p.name),
            el('p', { class: 'meta' }, 'Cliente: ' + p.client_name + ' (' + p.client_email + ')'),
            el('p', { class: 'meta' }, p.description || '—'),
            el('p', { class: 'meta' }, 'Atualizado em ' + fmtDate(p.updated_at))
          );
          content.appendChild(card);
        }
      } catch (e) {
        content.innerHTML = `<div class="error">${e.message}</div>`;
      }
    }
    loadProjects();
  </script>
</body>
</html>
