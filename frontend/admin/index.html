<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Visão geral · Diernus Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%232C49C7'/%3E%3Ctext x='32' y='45' font-family='monospace' font-weight='bold' font-size='38' fill='%23EDEAE3' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="app"></main>
  <script type="module">
    import { renderLayout, fmtDate, timeAgo } from '/shared/layout.js';
    import { api } from '/shared/api.js';

    const { me, content } = await renderLayout({ active: 'overview', crumbs: ['Visão geral'] });

    // stats
    const [c, p, iv] = await Promise.all([
      api.clients().catch(() => ({ clients: [] })),
      api.projects().catch(() => ({ projects: [] })),
      api.team().catch(() => ({ invitations: [] })),
    ]);
    const clients = c.clients || [];
    const projects = p.projects || [];
    const invitations = (iv.invitations || []).filter(i => !i.accepted_at && new Date(i.expires_at) > new Date());
    const pendingClients = clients.filter(c => c.status === 'pending').length;
    const activeProjects = projects.filter(p => p.status === 'active').length;

    content.innerHTML = `
      <div class="page-head">
        <div>
          <span class="eyebrow">Visão geral</span>
          <h1>Olá, ${me.name.split(' ')[0]}</h1>
          <p class="lede">Aqui está um resumo do que está a acontecer no estúdio.</p>
        </div>
        <div class="actions">
          <a class="btn ghost" href="/admin/projetos.html">Ver projetos</a>
          <a class="btn primary" href="/admin/clientes.html">+ Cliente</a>
        </div>
      </div>

      <div class="stats">
        <a class="stat" href="/admin/clientes.html" style="text-decoration:none;color:inherit">
          <div class="label">Clientes</div>
          <div class="value">${clients.length}</div>
          <div class="delta">${pendingClients} pendente${pendingClients === 1 ? '' : 's'}</div>
        </a>
        <a class="stat" href="/admin/projetos.html" style="text-decoration:none;color:inherit">
          <div class="label">Projetos ativos</div>
          <div class="value">${activeProjects}</div>
          <div class="delta">${projects.length} no total</div>
        </a>
        <a class="stat" href="/admin/convites.html" style="text-decoration:none;color:inherit">
          <div class="label">Convites pendentes</div>
          <div class="value">${invitations.length}</div>
          <div class="delta">${invitations.length ? 'expiram em 7 dias' : 'tudo enviado'}</div>
        </a>
      </div>

      <div class="row" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start">
        <div>
          <h2 style="margin-bottom:.7rem">Projetos recentes</h2>
          ${projects.length === 0
            ? '<div class="empty">Sem projetos. <a href="/admin/projetos.html">Crie o primeiro</a>.</div>'
            : `<table class="table"><thead><tr><th>Nome</th><th>Cliente</th><th>Atualizado</th></tr></thead>
              <tbody>${projects.slice(0, 6).map(p => `
                <tr>
                  <td class="name">${escapeHtml(p.name)}<small>${escapeHtml(p.description || '—')}</small></td>
                  <td>${escapeHtml(p.client_name)}</td>
                  <td><span class="mono" style="color:var(--graphite-60)">${timeAgo(p.updated_at)}</span></td>
                </tr>
              `).join('')}</tbody></table>`}
        </div>

        <div>
          <h2 style="margin-bottom:.7rem">Clientes pendentes</h2>
          ${pendingClients === 0
            ? '<div class="empty">Nenhum cliente a aguardar ativação.</div>'
            : `<table class="table"><thead><tr><th>Nome</th><th>Email</th><th></th></tr></thead>
              <tbody>${clients.filter(c => c.status === 'pending').map(c => `
                <tr>
                  <td class="name">${escapeHtml(c.name)}</td>
                  <td><span class="mono" style="font-size:.8rem">${escapeHtml(c.email)}</span></td>
                  <td class="actions"><a class="btn sm ghost" href="/admin/clientes.html">Reenviar convite →</a></td>
                </tr>
              `).join('')}</tbody></table>`}
        </div>
      </div>
    `;

    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  </script>
</body>
</html>
