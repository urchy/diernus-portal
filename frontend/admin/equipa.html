<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Equipa · Diernus Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%232C49C7'/%3E%3Ctext x='32' y='45' font-family='monospace' font-weight='bold' font-size='38' fill='%23EDEAE3' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="app"></main>
  <div class="modal-back" id="modalBack">
    <div class="modal">
      <h2>+ Membro da equipa</h2>
      <div class="error" id="err" style="display:none"></div>
      <form id="form">
        <label class="field"><label>Nome</label><input type="text" name="name" required></label>
        <label class="field"><label>Email</label><input type="email" name="email" required></label>
        <label class="field"><label>Tipo de acesso</label>
          <select name="role" id="inviteRole" required>
            <option value="team">Equipa — vê tudo exceto Finanças</option>
            <option value="admin" id="adminOption">Admin — vê tudo incluindo Finanças</option>
          </select>
        </label>
        <div class="row" style="display:flex;gap:.55rem">
          <button type="button" class="btn ghost" id="cancel" style="flex:1;justify-content:center;padding:.55rem">Cancelar</button>
          <button type="submit" class="btn primary" id="submit" style="flex:1;justify-content:center;padding:.55rem">Enviar convite</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module">
    import { renderLayout, fmtDate, timeAgo, pageLoading, safeRender } from '/shared/layout.js';
    import { api } from '/shared/api.js';
    const { content } = await renderLayout({ active: 'team', crumbs: ['Equipa'] });
    const loading = pageLoading(content, 'A carregar equipa…');
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    async function render() {
      const [team, allUsers] = await Promise.all([
        api.team().catch(() => ({ invitations: [] })),
        api.me(),
      ]);
      const me = allUsers.user;
      // also fetch active studio members
      const { members } = await api.teamMembers().catch(() => ({ members: [] }));
      const iAmAdmin = me.role === 'admin';

      // hide the "Admin" option from the invite dropdown for non-admins
      const adminOption = document.getElementById('adminOption');
      if (adminOption) adminOption.style.display = iAmAdmin ? '' : 'none';

      const rolePill = (r) =>
        r === 'admin' ? '<span class="status-pill active">admin</span>'
      : r === 'team'  ? '<span class="status-pill pending">equipa</span>'
      :                '<span class="status-pill">—</span>';

      content.innerHTML = `
        <div class="page-head">
          <div>
            <span class="eyebrow">Equipa</span>
            <h1>Membros do estúdio</h1>
            <p class="lede">Quem está dentro do estúdio e quem está a aguardar convite.</p>
          </div>
          <div class="actions"><button class="btn primary" id="newTeam">+ Convidar membro</button></div>
        </div>

        <h2 style="margin-bottom:.7rem">No estúdio (${members.length})</h2>
        ${members.length === 0
          ? '<div class="empty"><div class="empty-title">Ainda só você</div><div class="empty-sub">Convide outra pessoa para o estúdio para partilhar projetos e tempo.</div></div>'
          : `<table class="table">
              <thead><tr><th>Nome</th><th>Email</th><th>Tipo</th><th>Último acesso</th></tr></thead>
              <tbody>${members.map(m => `
                <tr>
                  <td class="name">${escapeHtml(m.name)}${m.id === me.id ? ' <span class="status-pill active" style="margin-left:.5rem">tu</span>' : ''}</td>
                  <td><span class="mono" style="font-size:.8rem">${escapeHtml(m.email)}</span></td>
                  <td>${rolePill(m.role)}</td>
                  <td><span class="mono" style="color:var(--graphite-60);font-size:.8rem">${m.last_seen_at ? timeAgo(m.last_seen_at) : 'nunca'}</span></td>
                </tr>
              `).join('')}</tbody>
            </table>`}

        <h2 style="margin:1.6rem 0 .7rem">Convites pendentes</h2>
        ${(() => {
          const pending = (team.invitations || []).filter(i => !i.accepted_at && new Date(i.expires_at) > new Date());
          if (pending.length === 0) return '<div class="empty"><div class="empty-title">Sem convites pendentes</div><div class="empty-sub">Quando enviar um convite, ele aparece aqui até ser aceite ou expirar.</div></div>';
          return `<table class="table">
            <thead><tr><th>Nome</th><th>Email</th><th>Tipo</th><th>Expira</th><th></th></tr></thead>
            <tbody>${pending.map(i => `
              <tr>
                <td class="name">${escapeHtml(i.name)}</td>
                <td><span class="mono" style="font-size:.8rem">${escapeHtml(i.email)}</span></td>
                <td>${rolePill(i.role)}</td>
                <td><span class="mono" style="color:var(--graphite-60);font-size:.8rem">${timeAgo(i.expires_at)}</span></td>
                <td class="actions"><button class="btn sm ghost" data-resend="${escapeHtml(i.email)}" data-role="${escapeHtml(i.role)}">Reenviar</button></td>
              </tr>`).join('')}</tbody>
          </table>`;
        })()}
      `;
      document.getElementById('newTeam').addEventListener('click', openModal);
      // resend buttons — preserve the original role
      content.querySelectorAll('button[data-resend]').forEach(b => {
        b.addEventListener('click', async () => {
          const email = b.dataset.resend;
          const role = b.dataset.role || 'team';
          const name = prompt('Nome completo do membro:', email.split('@')[0]);
          if (!name) return;
          try {
            const r = await api.inviteTeam(email, name, role);
            if (r.warning) prompt('Email não enviado — copie este link para enviar manualmente:', r.invitation.accept_url);
            else alert('Convite reenviado para ' + email);
          } catch (e) { alert('Erro: ' + e.message); }
        });
      });
    }

    function openModal() {
      document.getElementById('form').reset();
      document.getElementById('err').style.display = 'none';
      document.getElementById('modalBack').classList.add('on');
    }
    function closeModal() { document.getElementById('modalBack').classList.remove('on'); }
    document.getElementById('cancel').addEventListener('click', closeModal);
    document.getElementById('modalBack').addEventListener('click', e => { if (e.target.id === 'modalBack') closeModal(); });
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const data = new FormData(e.target);
      const submit = document.getElementById('submit');
      submit.disabled = true; submit.textContent = 'A enviar…';
      try {
        // Default to 'team'; admins can choose 'admin' from the dropdown.
        const role = data.get('role') || 'team';
        const res = await api.inviteTeam(data.get('email'), data.get('name'), role);
        if (res.warning) prompt('Email não enviado — copie este link para enviar manualmente:', res.invitation.accept_url);
        closeModal();
        await render();
      } catch (err) {
        const el = document.getElementById('err');
        el.textContent = err.message; el.style.display = '';
      } finally {
        submit.disabled = false; submit.textContent = 'Enviar convite';
      }
    });

    safeRender(loading, render);
  </script>
</body>
</html>
