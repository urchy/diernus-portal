<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Projeto · Diernus Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%232C49C7'/%3E%3Ctext x='32' y='45' font-family='monospace' font-weight='bold' font-size='38' fill='%23EDEAE3' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="app"></main>
  <script type="module">
    import { renderLayout } from '/shared/layout.js';
    import { api } from '/shared/api.js';
    import { mountBoard } from '/shared/board.js';
    const { me, content } = await renderLayout({ active: 'projects', crumbs: ['Projetos', 'Detalhe'] });
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { content.innerHTML = '<div class="error">ID em falta.</div>'; }
    else {
      // a back-link at the top of the page (since the sidebar nav doesn't carry the id)
      const back = document.createElement('div');
      back.style.marginBottom = '1rem';
      back.innerHTML = '<a class="mono" style="color:var(--graphite-60);text-decoration:none;font-size:.7rem;letter-spacing:.14em" href="/admin/projetos.html">‹ PROJETOS</a>';
      content.appendChild(back);
      await mountBoard(content, id, 'studio');
      // Append the project files section (studio only — portal/projeto.html is read-only)
      const filesWrap = document.createElement('section');
      filesWrap.className = 'project-files';
      filesWrap.innerHTML = `
        <div class="project-files-head">
          <h2>Ficheiros do projeto</h2>
          <label class="btn sm ghost" id="projFileDrop" style="cursor:pointer">
            📎 Enviar ficheiro
            <input type="file" id="projFileInput" hidden>
          </label>
        </div>
        <div class="project-files-list" id="projFilesList"><em style="color:var(--graphite-60)">A carregar…</em></div>
      `;
      content.appendChild(filesWrap);
      // load files
      const list = filesWrap.querySelector('#projFilesList');
      try {
        const { files } = await api.projectFiles(id);
        if (files.length === 0) {
          list.outerHTML = '<div class="project-files-empty">Sem ficheiros. Carregue PDFs, imagens ou 3D para partilhar com o cliente.</div>';
        } else {
          list.innerHTML = files.map(f => `
            <div class="cd-file">
              <span class="cd-file-ext cd-file-ext-${(f.filename.split('.').pop()||'').toLowerCase().slice(0,4)}">${(f.filename.split('.').pop()||'').toLowerCase().slice(0,4)}</span>
              <a class="cd-file-name" href="${api.fileDownloadUrl(f.id)}" target="_blank" rel="noopener" download>${f.filename}</a>
              <span class="cd-file-meta">${(f.size < 1048576 ? Math.max(1, Math.round(f.size/1024)) + ' KB' : (f.size/1048576).toFixed(1) + ' MB')} · ${f.uploader_name || ''}</span>
              <button class="cd-file-del" data-file-del="${f.id}" title="Apagar">✕</button>
            </div>`).join('');
        }
      } catch (e) {
        list.innerHTML = '<div class="error">' + e.message + '</div>';
      }
      // upload
      const inp = filesWrap.querySelector('#projFileInput');
      const drop = filesWrap.querySelector('#projFileDrop');
      drop.addEventListener('click', () => inp.click());
      inp.addEventListener('change', async () => {
        if (inp.files?.[0]) {
          try {
            await api.uploadFile(id, inp.files[0]);
            location.reload();
          } catch (e) { alert('Erro: ' + e.message); }
        }
      });
      // delete (event delegation)
      filesWrap.addEventListener('click', async e => {
        const b = e.target.closest('button[data-file-del]');
        if (!b) return;
        if (!confirm('Apagar este ficheiro?')) return;
        try { await api.deleteFile(b.dataset.fileDel); b.closest('.cd-file').remove(); }
        catch (err) { alert('Erro: ' + err.message); }
      });
    }
  </script>
</body>
</html>
