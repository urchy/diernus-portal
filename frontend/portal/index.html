<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Portal · Diernus</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%232C49C7'/%3E%3Ctext x='32' y='45' font-family='monospace' font-weight='bold' font-size='38' fill='%23EDEAE3' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="app"></main>
  <script type="module">
    import { renderLayout, fmtDate, timeAgo, pageLoading, safeRender, escapeHtml } from '/shared/layout.js';
    import { api } from '/shared/api.js';
    const { me, content } = await renderLayout({ active: 'projects', crumbs: ['Os meus projetos'] });
    const loading = pageLoading(content, 'A carregar projetos…');

    // Small helpers — keep card rendering readable
    function daysUntil(dueIso) {
      if (!dueIso) return null;
      const d = new Date(dueIso);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      d.setHours(0, 0, 0, 0);
      return Math.round((d - today) / 86400000);
    }
    function dueLabel(days) {
      if (days == null) return null;
      if (days < 0)  return { text: `atrasado há ${Math.abs(days)} d`, tone: 'stamp' };
      if (days === 0) return { text: 'vence hoje', tone: 'stamp' };
      if (days <= 7)  return { text: `vence em ${days} d`, tone: 'amber' };
      return { text: `prazo ${fmtDate(daysToIso(days))}`, tone: 'graphite' };
    }
    function daysToIso(days) {
      const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    async function render() {
      const { projects } = await api.projects();
      const active    = projects.filter(p => p.status === 'active');
      const completed = projects.filter(p => p.status === 'completed');

      // Render a project as a card
      const card = p => {
        const days = daysUntil(p.due_date);
        const due  = days != null ? dueLabel(days) : null;
        return `
          <a class="portal-card ${p.status === 'completed' ? 'is-completed' : ''}" href="/portal/projeto.html?id=${encodeURIComponent(p.id)}">
            <div class="portal-card-status">
              <span class="status-pill ${p.status === 'active' ? 'online' : 'active'}">${p.status === 'active' ? 'em curso' : 'concluído'}</span>
            </div>
            <div class="portal-card-body">
              <h3 class="portal-card-name">${escapeHtml(p.name)}</h3>
              ${p.description ? `<p class="portal-card-desc">${escapeHtml(p.description)}</p>` : ''}
              <div class="portal-card-meta">
                ${due ? `<span class="mono portal-due portal-due-${due.tone}">${due.text}</span>` : ''}
                <span class="mono portal-updated">atualizado ${timeAgo(p.updated_at)}</span>
              </div>
            </div>
            <span class="portal-card-cta">ver projeto <span class="portal-card-arrow">›</span></span>
          </a>
        `;
      };

      // Greeting uses the first name; fall back to the full name
      const firstName = (me.name || me.email || '').trim().split(/\s+/)[0] || 'olá';
      const activeLine = active.length === 1 ? '1 projeto em curso' : `${active.length} projetos em curso`;
      const summary = active.length
        ? `<p class="portal-summary">${escapeHtml(activeLine)}${completed.length ? ` · ${completed.length} concluído${completed.length === 1 ? '' : 's'}` : ''}</p>`
        : '';

      content.innerHTML = `
        <div class="page-head">
          <div>
            <span class="eyebrow">Os seus projetos</span>
            <h1>Olá, ${escapeHtml(firstName)}</h1>
            <p class="lede">Acompanhe o progresso do seu projeto, comente nos cartões e descarregue os ficheiros partilhados pelo estúdio.</p>
          </div>
        </div>
        ${summary}
        ${projects.length === 0
          ? '<div class="empty"><div class="empty-title">Sem projetos por agora</div><div class="empty-sub">Quando o estúdio iniciar um projeto para si, ele aparece aqui.</div></div>'
          : `<div class="portal-cards">
              ${active.map(card).join('')}
              ${completed.length ? `
                <h2 class="portal-section">Concluídos</h2>
                ${completed.map(card).join('')}
              ` : ''}
            </div>`}
      `;
    }

    safeRender(loading, render);
  </script>
</body>
</html>
