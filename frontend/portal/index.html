<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Portal · Diernus</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%232C49C7'/%3E%3Ctext x='32' y='45' font-family='monospace' font-weight='bold' font-size='38' fill='%23EDEAE3' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="app"></main>
  <script type="module">
    import { renderLayout, timeAgo } from '/shared/layout.js';
    import { api } from '/shared/api.js';
    const { me, content } = await renderLayout({ active: 'projects', crumbs: ['Os meus projetos'] });
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    const { projects } = await api.projects();
    content.innerHTML = `
      <div class="page-head">
        <div>
          <span class="eyebrow">Os seus projetos</span>
          <h1>Olá, ${me.name.split(' ')[0]}</h1>
          <p class="lede">Aqui pode acompanhar o progresso do seu projeto, comentar nos cartões e descarregar os ficheiros partilhados pelo estúdio.</p>
        </div>
      </div>
      ${projects.length === 0
        ? '<div class="empty">Ainda não tem projetos. O estúdio criará um em breve.</div>'
        : `<table class="table">
            <thead><tr><th>Projeto</th><th>Estado</th><th>Atualizado</th></tr></thead>
            <tbody>${projects.map(p => `
              <tr>
                <td class="name">${escapeHtml(p.name)}<small>${escapeHtml(p.description || '—')}</small></td>
                <td><span class="status-pill ${p.status === 'active' ? 'online' : p.status === 'completed' ? 'active' : 'suspended'}">${p.status === 'active' ? 'em curso' : p.status === 'completed' ? 'concluído' : p.status}</span></td>
                <td><span class="mono" style="color:var(--graphite-60);font-size:.8rem">${timeAgo(p.updated_at)}</span></td>
              </tr>
            `).join('')}</tbody>
          </table>`}
    `;
  </script>
</body>
</html>
