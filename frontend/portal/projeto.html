<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Projeto · Diernus Portal</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%232C49C7'/%3E%3Ctext x='32' y='45' font-family='monospace' font-weight='bold' font-size='38' fill='%23EDEAE3' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main id="app"></main>
  <script type="module">
    import { renderLayout, escapeHtml } from '/shared/layout.js';
    import { api } from '/shared/api.js';
    import { mountBoard } from '/shared/board.js';
    const { me, content } = await renderLayout({ active: 'projects', crumbs: ['Meus projetos', 'Detalhe'] });
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { content.innerHTML = '<div class="error">ID em falta.</div>'; }
    else {
      const back = document.createElement('div');
      back.style.marginBottom = '1rem';
      back.innerHTML = '<a class="mono" style="color:var(--graphite-60);text-decoration:none;font-size:.7rem;letter-spacing:.14em" href="/portal/">‹ OS MEUS PROJETOS</a>';
      content.appendChild(back);
      await mountBoard(content, id, 'client');
      // Project files section — client can upload too (smaller cap, 25 MB)
      const filesWrap = document.createElement('section');
      filesWrap.className = 'project-files';
      filesWrap.innerHTML = `
        <div class="project-files-head">
          <h2>Ficheiros do projeto</h2>
          <label class="btn sm ghost" id="projFileDrop" style="cursor:pointer">
            📎 Enviar ficheiro
            <input type="file" id="projFileInput" hidden>
          </label>
        </div>
        <div class="project-files-list" id="projFilesList"><em style="color:var(--graphite-60)">A carregar…</em></div>
        <div class="cd-file-status" id="projFileStatus" style="display:none;margin-top:.4rem"></div>
      `;
      content.appendChild(filesWrap);
      const list = filesWrap.querySelector('#projFilesList');
      const status = filesWrap.querySelector('#projFileStatus');
      async function loadFiles() {
        try {
          const { files } = await api.projectFiles(id);
          if (files.length === 0) {
            list.innerHTML = '<div class="project-files-empty">Ainda não há ficheiros partilhados.</div>';
          } else {
            list.innerHTML = files.map(f => `
              <div class="cd-file">
                <span class="cd-file-ext cd-file-ext-${(f.filename.split('.').pop()||'').toLowerCase().slice(0,4)}">${(f.filename.split('.').pop()||'').toLowerCase().slice(0,4)}</span>
                <a class="cd-file-name" href="${api.fileDownloadUrl(f.id)}" target="_blank" rel="noopener" download>${escapeHtml(f.filename)}</a>
                <span class="cd-file-meta">${(f.size < 1048576 ? Math.max(1, Math.round(f.size/1024)) + ' KB' : (f.size/1048576).toFixed(1) + ' MB')} · ${escapeHtml(f.uploader_name || '')}</span>
              </div>`).join('');
          }
        } catch (e) {
          list.innerHTML = '<div class="error">' + e.message + '</div>';
        }
      }
      await loadFiles();

      // upload
      const inp = filesWrap.querySelector('#projFileInput');
      const drop = filesWrap.querySelector('#projFileDrop');
      drop.addEventListener('click', () => inp.click());
      inp.addEventListener('change', async () => {
        if (!inp.files?.[0]) return;
        const f = inp.files[0];
        if (f.size > 25 * 1024 * 1024) {
          status.style.display = ''; status.textContent = 'Ficheiro demasiado grande (máx. 25 MB).';
          return;
        }
        status.style.display = ''; status.textContent = `A enviar ${f.name}…`;
        try {
          await api.uploadFile(id, f);
          status.textContent = 'Enviado. O estúdio foi notificado.';
          inp.value = '';
          await loadFiles();
          setTimeout(() => { status.style.display = 'none'; }, 3000);
        } catch (e) {
          status.textContent = 'Erro: ' + e.message;
        }
      });
    }
  </script>
</body>
</html>
